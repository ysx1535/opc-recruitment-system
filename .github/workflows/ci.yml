name: CI - Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '8'

jobs:
  # 代码质量检查
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: 📦 Install Dependencies
        run: npm ci
      
      - name: 🔍 Run ESLint
        run: npm run lint
      
      - name: 🎨 Check Prettier Formatting
        run: npm run format:check

  # 后端测试
  test-backend:
    name: 🧪 Test Backend (NestJS)
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: 📦 Install Dependencies
        run: |
          cd src/backend
          npm ci
      
      - name: 🧪 Run Unit Tests
        run: |
          cd src/backend
          npm run test
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/test_db
          MONGODB_URI: mongodb://localhost:27017/test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
      
      - name: 🧪 Run E2E Tests
        run: |
          cd src/backend
          npm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/test_db
          MONGODB_URI: mongodb://localhost:27017/test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
      
      - name: 📊 Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./src/backend/coverage/coverage-final.json
          flags: backend
          fail_ci_if_error: false

  # 前端测试
  test-frontend:
    name: 🧪 Test Frontend (Next.js)
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: 📦 Install Dependencies
        run: |
          cd src/frontend
          npm ci
      
      - name: 🔨 Build Check
        run: |
          cd src/frontend
          npm run build
      
      - name: 🧪 Run Tests
        run: |
          cd src/frontend
          npm run test
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
      
      - name: 📊 Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./src/frontend/coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

  # 安全扫描
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🔒 Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: 📤 Upload Trivy Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: 🔍 Run Snyk Security Check
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --severity-threshold=high

  # 构建 Docker 镜像
  build-docker:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 🔨 Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: false
          tags: opc-recruitment-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: 🔨 Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          push: false
          tags: opc-recruitment-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 代码质量报告
  quality-report:
    name: 📊 Quality Report
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]
    if: always()
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 📊 Generate Quality Report
        run: |
          echo "# CI Quality Report" > quality-report.md
          echo "" >> quality-report.md
          echo "## Test Results" >> quality-report.md
          echo "- Lint: ${{ needs.lint.result }}" >> quality-report.md
          echo "- Backend Tests: ${{ needs.test-backend.result }}" >> quality-report.md
          echo "- Frontend Tests: ${{ needs.test-frontend.result }}" >> quality-report.md
          echo "" >> quality-report.md
          echo "## Coverage" >> quality-report.md
          echo "Check the Codecov tab for detailed coverage report." >> quality-report.md
      
      - name: 📤 Upload Quality Report
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: quality-report.md
