version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: opc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: opc_recruitment
      TZ: Asia/Shanghai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - opc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB 文档数据库
  mongodb:
    image: mongo:7
    container_name: opc-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      TZ: Asia/Shanghai
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - opc-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存 & 消息队列
  redis:
    image: redis:7-alpine
    container_name: opc-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - opc-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch 搜索引擎
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: opc-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - TZ=Asia/Shanghai
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - opc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Adminer (数据库管理工具)
  adminer:
    image: adminer:latest
    container_name: opc-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - opc-network
    depends_on:
      - postgres

  # Redis Commander (Redis 管理工具)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: opc-redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:password
      - TZ=Asia/Shanghai
    ports:
      - "8081:8081"
    networks:
      - opc-network
    depends_on:
      - redis

  # Mongo Express (MongoDB 管理工具)
  mongo-express:
    image: mongo-express:latest
    container_name: opc-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://root:password@mongodb:27017/
      TZ: Asia/Shanghai
    ports:
      - "8082:8081"
    networks:
      - opc-network
    depends_on:
      - mongodb

  # PaddleOCR (OCR 服务)
  paddleocr:
    image: paddlepaddle/paddle:2.5.0rc0-gpu-cuda11.2-cudnn8.4-trt8.4
    container_name: opc-paddleocr
    restart: unless-stopped
    command: >
      bash -c "
        pip install paddleocr fastapi uvicorn && 
        python -m paddleocr.ppocr.utils.utility -h &&
        uvicorn ocr_server:app --host 0.0.0.0 --port 9000
      "
    ports:
      - "9000:9000"
    volumes:
      - ./scripts/ocr_server.py:/workspace/ocr_server.py
    networks:
      - opc-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # 后端服务 (NestJS)
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      target: development
    container_name: opc-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:password@postgres:5432/opc_recruitment
      MONGODB_URI: mongodb://root:password@mongodb:27017/opc_recruitment?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: password
      TZ: Asia/Shanghai
    ports:
      - "3001:3001"
    volumes:
      - ./src/backend:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    networks:
      - opc-network
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run start:dev

  # 前端服务 (Next.js)
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      target: development
    container_name: opc-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      TZ: Asia/Shanghai
    ports:
      - "3000:3000"
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - opc-network
    depends_on:
      - backend
    command: npm run dev

  # Prometheus (监控)
  prometheus:
    image: prom/prometheus:latest
    container_name: opc-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - opc-network

  # Grafana (可视化监控)
  grafana:
    image: grafana/grafana:latest
    container_name: opc-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      TZ: Asia/Shanghai
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - opc-network
    depends_on:
      - prometheus

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  opc-network:
    driver: bridge
