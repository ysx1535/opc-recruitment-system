events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=1r/s;

    # Upstream backend
    upstream backend {
        server backend:3001;
    }

    # Upstream frontend
    upstream frontend {
        server frontend:3000;
    }

    # HTTP redirect to HTTPS (if SSL configured)
    server {
        listen 80;
        server_name 182.92.112.224;

        # If you have domain, replace above with your domain
        # server_name yourdomain.com www.yourdomain.com;

        location / {
            return 301 https://$server_name$request_uri;
        }

        # Let's Encrypt challenge
        location /.well-known/acert-challenge/ {
            root /var/www/certbot;
        }
    }

    # HTTPS server (commented - enable after SSL setup)
    # server {
    #     listen 443 ssl http2;
    #     server_name 182.92.112.224;
    #
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #
    #     # Frontend
    #     location / {
    #         proxy_pass http://frontend;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    #
    #     # Backend API
    #     location /api/ {
    #         proxy_pass http://backend/;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    #
    #     # Health check
    #     location /health {
    #         proxy_pass http://backend/health;
    #     }
    # }

    # Temporary: HTTP only (for testing)
    server {
        listen 80;
        server_name 182.92.112.224;

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;
        }

        # Auth endpoints with stricter rate limiting
        location /api/auth/login {
            proxy_pass http://backend/api/auth/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Stricter rate limiting for login
            limit_req zone=login_limit burst=5 nodelay;
        }

        # Health check
        location /health {
            proxy_pass http://backend/health;
        }

        # WebSocket support
        location /ws/ {
            proxy_pass http://backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
